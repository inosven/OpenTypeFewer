<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenTypeFewer</title>
  <link rel="stylesheet" href="css/theme.css">
  <style>
    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      border-radius: 16px;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px 16px;
      gap: 0;
    }

    .top-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .orb-container {
      position: relative;
      width: 80px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orb-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: var(--accent-glow);
      transition: background 0.3s;
    }

    .orb {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      transition: background 0.3s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .orb svg {
      width: 28px;
      height: 28px;
      fill: rgba(255, 255, 255, 0.9);
    }

    body.state-recording .orb {
      background: var(--recording);
      box-shadow: 0 4px 20px var(--recording-glow);
    }

    body.state-recording .orb-ring {
      background: var(--recording-glow);
      animation: pulse-ring 1.2s ease-in-out infinite;
    }

    body.state-processing .orb {
      background: var(--processing);
      box-shadow: 0 4px 20px var(--processing-glow);
    }

    body.state-processing .orb svg {
      animation: spin 1.2s linear infinite;
    }

    .status-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    body.state-recording .status-label {
      color: var(--recording);
    }

    body.state-processing .status-label {
      color: var(--processing);
    }

    .volume-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 24px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    body.state-recording .volume-bars {
      opacity: 1;
    }

    .volume-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--recording);
      min-height: 3px;
      transition: height 0.08s ease-out;
    }

    .meta-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .preset-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mode-language {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .info-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .hotkey-hint {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: "SF Mono", "Menlo", monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 6px;
    }

    .top-btn {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: transparent;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
    }

    .top-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .top-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <button class="top-btn" id="settings-btn" title="Settings">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.92c.04-.34.07-.69.07-1.08s-.03-.73-.07-1.08l2.32-1.82c.21-.16.27-.46.13-.7l-2.2-3.8c-.13-.25-.42-.34-.67-.25l-2.74 1.1c-.57-.44-1.18-.81-1.86-1.08L14.21 2.1c-.04-.27-.28-.47-.55-.47h-4.4c-.27 0-.51.2-.55.47l-.41 2.77c-.68.27-1.3.64-1.86 1.08L3.7 4.85c-.25-.09-.54 0-.67.25l-2.2 3.8c-.14.24-.08.54.13.7l2.32 1.82c-.04.35-.07.7-.07 1.08s.03.73.07 1.08L.96 15.4c-.21.16-.27.46-.13.7l2.2 3.8c.13.25.42.34.67.25l2.74-1.1c.57.44 1.18.81 1.86 1.08l.41 2.77c.04.27.28.47.55.47h4.4c.27 0 .51-.2.55-.47l.41-2.77c.68-.27 1.3-.64 1.86-1.08l2.74 1.1c.25.09.54 0 .67-.25l2.2-3.8c.14-.24.08-.54-.13-.7l-2.32-1.82z"/>
      </svg>
    </button>
    <button class="top-btn" id="minimize-btn" title="Minimize to tray">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 13H5v-2h14v2z"/>
      </svg>
    </button>
  </div>

  <div class="orb-container">
    <div class="orb-ring"></div>
    <div class="orb">
      <svg class="icon-mic" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3zm-1 3a1 1 0 0 1 2 0v8a1 1 0 0 1-2 0V4zm-6 8a7 7 0 0 0 14 0h-2a5 5 0 0 1-10 0H5zm7 9v-2h-2v2H8v2h8v-2h-2z"/>
      </svg>
      <svg class="icon-spin" style="display:none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2a10 10 0 1 0 10 10h-2a8 8 0 1 1-8-8V2z"/>
      </svg>
    </div>
  </div>

  <div class="status-label" id="status-label">Ready</div>

  <div class="volume-bars" id="volume-bars">
    <div class="volume-bar" id="bar0"></div>
    <div class="volume-bar" id="bar1"></div>
    <div class="volume-bar" id="bar2"></div>
    <div class="volume-bar" id="bar3"></div>
    <div class="volume-bar" id="bar4"></div>
  </div>

  <div class="info-section">
    <div class="preset-name" id="preset-name">OpenTypeFewer</div>
    <div class="mode-language" id="mode-language">Direct · Source</div>
    <div class="hotkey-hint" id="hotkey-hint">...</div>
  </div>

  <script src="js/panel.js"></script>
</body>
</html>
